name: Test Secrets
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          TG: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "TELEGRAM_TOKEN length: ${#TG}"
          echo "TELEGRAM_CHAT_ID length: ${#CHAT}"
          echo "TELEGRAM_CHAT_ID value: $CHAT"
